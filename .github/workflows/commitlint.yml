name: Commitlint

# PR のコミットメッセージを Conventional Commits に沿っているか検査する。
# ローカルの commit-msg フックは --no-verify で飛ばせるため、CI でも担保する。
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: commitlint
    # リリース PR（base=main）は develop の確定コミットを再 lint するだけで、過去のスカッシュ件名
    # （= PR タイトル・当時 commitlint 未検査）で落ちうる（共有履歴ゆえ修正不能）。新規コミットの検査は
    # フィーチャー PR（base=develop）で担保するため、base=main の PR ではスキップする（ADR-0037）。
    if: github.event.pull_request.base.ref != 'main'
    runs-on: ubuntu-latest
    steps:
      # PR 範囲のコミットを検査するため全履歴を取得する
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint PR commits
        run: >-
          pnpm exec commitlint
          --from "${{ github.event.pull_request.base.sha }}"
          --to "${{ github.event.pull_request.head.sha }}"
          --verbose
