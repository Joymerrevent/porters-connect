name: Commitlint

# PR のコミットメッセージを Conventional Commits に沿っているか検査する。
# ローカルの commit-msg フックは --no-verify で飛ばせるため、CI でも担保する。
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      # PR 範囲のコミットを検査するため全履歴を取得する
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # lint 範囲を決める。フィーチャー PR（base≠main）は従来どおり base..head の新規コミットを検査する。
      # リリース PR（base=main・release/* → main）は base=main..head だと直前リリース以降の develop 全コミットを
      # 再 lint し、過去のスカッシュ件名（= PR タイトル・当時未検査・共有履歴ゆえ修正不能）で落ちうる。そこで
      # 範囲を「develop に未取り込みの release 固有コミット（chore(release) 等）」= origin/develop..head に絞る（ADR-0039）。
      - name: Determine lint range
        id: range
        run: |
          if [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
            git fetch --no-tags origin develop
            echo "from=$(git rev-parse origin/develop)" >> "$GITHUB_OUTPUT"
          else
            echo "from=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint PR commits
        run: >-
          pnpm exec commitlint
          --from "${{ steps.range.outputs.from }}"
          --to "${{ github.event.pull_request.head.sha }}"
          --verbose
