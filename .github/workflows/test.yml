name: Test

# 対応 Node（20=Maintenance LTS / 22=Active LTS / 24=Current）でテストを回し互換性を担保。
# 非必須チェックなので docs-only は paths-ignore で素直に skip（runner すら起動しない・ADR-0028）。
on:
  pull_request:
    paths-ignore: ["**/*.md", "docs/**"]
  push:
    branches: [main, develop]
    paths-ignore: ["**/*.md", "docs/**"]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test
