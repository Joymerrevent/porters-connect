name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

# 同一 ref で進行中の run は新しい push で打ち切る（ランナー節約・フィードバック高速化）
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # 変更が docs だけか判定（ADR-0028）。docs-only は重い検査を skip し lint/format だけにする。
      # 必須チェックなので job 自体は常に走り報告する（paths-ignore は使わない＝"Expected" 詰み回避）。
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - "**"
              - "!**/*.md"
              - "!docs/**"

      # pnpm を先に入れる（setup-node の cache: pnpm が pnpm を要求するため）
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # 整形・lint は docs PR でも常時（docs-only の「lint だけ」はここ）
      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      # リリース連動文書の整合チェック（ADR-0027）。常時実行（README/CHANGELOG 変更も拾うため）。
      - name: Release invariants
        run: pnpm check:release

      # 以下はコード変更時のみ（docs-only は skip）
      - name: Typecheck
        if: steps.changes.outputs.code == 'true'
        run: pnpm typecheck

      - name: Test (coverage)
        if: steps.changes.outputs.code == 'true'
        run: pnpm test:coverage

      - name: Build
        if: steps.changes.outputs.code == 'true'
        run: pnpm build

      # 公開物の正当性（exports/files/types）と型解決（ADR-0027）。build 後に検査。
      - name: Check publish (publint + attw)
        if: steps.changes.outputs.code == 'true'
        run: pnpm check:publish

      # 公開依存（prod）の high 以上のみブロックする狭いゲート（フェイルセーフ）。
      - name: Audit (production deps, high+)
        if: steps.changes.outputs.code == 'true'
        run: pnpm audit --prod --audit-level high
