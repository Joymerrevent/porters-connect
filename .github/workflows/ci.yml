name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

# 同一 ref で進行中の run は新しい push で打ち切る（ランナー節約・フィードバック高速化）
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm を先に入れる（setup-node の cache: pnpm が pnpm を要求するため）
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # 以下はプロジェクトの package.json にあるスクリプトに合わせて取捨する。
      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      # 公開依存（prod）の high 以上のみブロックする狭いゲート。
      # devDep / moderate / low は Dependabot（alerts＋security updates）で淘汰し、ここでは止めない。
      # → 利用者に届く重大な脆弱性だけを fail させる＝低ノイズで迂回されにくい（フェイルセーフ）。
      - name: Audit (production deps, high+)
        run: pnpm audit --prod --audit-level high
