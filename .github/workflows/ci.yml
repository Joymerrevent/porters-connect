name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm を先に入れる（setup-node の cache: pnpm が pnpm を要求するため）
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # 以下はプロジェクトの package.json にあるスクリプトに合わせて取捨する。
      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint
      # NOTE: typecheck / test / build steps are intentionally omitted until the
      # scaffold (tsup / vitest / tsc) lands. Restore them once those scripts exist.
