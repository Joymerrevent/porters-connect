name: 機能要望
description: 新機能・改善の提案
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **非公式ライブラリ**への提案です。PORTERS 製品自体への要望は PORTERS 公式へ。
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どんな場面で困っているか（背景・ユースケース）
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案する解決策
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
  - type: input
    id: resource
    attributes:
      label: 関連リソース / スコープ
      description: 例 Candidate / Job / OAuth など（あれば）
